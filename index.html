<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Create beautiful, customizable QR codes instantly. Free, no watermarks, works offline." />
    <meta name="theme-color" content="#f9f6f1" />

    <!-- Google Fonts - Inter (loaded via CSS @import for SW compatibility) -->

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Qrius - QR Code Generator" />
    <meta property="og:description" content="Create beautiful, customizable QR codes instantly. Free, no watermarks, works offline." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://qriuscodes.com" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Qrius — QR Code Generator" />
    <meta name="twitter:description" content="Create beautiful, customizable QR codes instantly. Free, no watermarks, works offline." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://qriuscodes.com" />

    <title>Qrius - QR Code Generator</title>

    <!-- Structured data -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Qrius Codes",
        "url": "https://qriuscodes.com",
        "logo": "https://qriuscodes.com/favicon.svg",
        "sameAs": []
      },
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Qrius Codes",
        "url": "https://qriuscodes.com",
        "description": "Create beautiful, customizable QR codes with real-time scan analytics. 9 QR code types, brand templates, team collaboration, and API access.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "All",
        "offers": [
          {
            "@type": "Offer",
            "name": "Free",
            "price": "0",
            "priceCurrency": "USD"
          },
          {
            "@type": "Offer",
            "name": "Starter",
            "price": "12",
            "priceCurrency": "USD",
            "billingIncrement": "P1M"
          },
          {
            "@type": "Offer",
            "name": "Pro",
            "price": "29",
            "priceCurrency": "USD",
            "billingIncrement": "P1M"
          },
          {
            "@type": "Offer",
            "name": "Business",
            "price": "79",
            "priceCurrency": "USD",
            "billingIncrement": "P1M"
          }
        ],
        "creator": {
          "@type": "Organization",
          "name": "Qrius Codes"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "150",
          "bestRating": "5"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is a dynamic QR code?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A dynamic QR code uses a short redirect URL that you can update anytime without reprinting. It also tracks scans with analytics like location, device, and time."
            }
          },
          {
            "@type": "Question",
            "name": "Is Qrius Codes free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes! The free plan includes 5 dynamic QR codes with unlimited scans. Paid plans start at $12/month for more codes, SVG downloads, and extended history."
            }
          },
          {
            "@type": "Question",
            "name": "What QR code types are supported?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Qrius Codes supports 9 types: URL, Text, Email, Phone, SMS, WiFi, vCard (contact card), Calendar Event, and Location."
            }
          }
        ]
      }
    ]
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
